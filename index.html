  <script>
    AFRAME.registerComponent('hud-quad', {
      schema: {
        renderOrder: { type: 'number', default: 9999 }
      },
      init: function () {
        this.applySettings = this.applySettings.bind(this);
        this.el.addEventListener('object3dset', this.applySettings);
      },
      update: function () {
        this.applySettings();
      },
      remove: function () {
        this.el.removeEventListener('object3dset', this.applySettings);
      },
      applySettings: function () {
        const mesh = this.el.getObject3D('mesh');
        if (!mesh) return;

        mesh.renderOrder = this.data.renderOrder;

        mesh.traverse(node => {
          if (!node.isMesh || !node.material) return;

          const materials = Array.isArray(node.material) ? node.material : [node.material];
          materials.forEach(material => {
            material.depthTest = false;
            material.depthWrite = false;
            material.transparent = true;
            material.side = THREE.DoubleSide;
            material.needsUpdate = true;
          });
        });
      }
    });

    AFRAME.registerComponent('gif-texture-updater', {
      tick: function () {
        const mesh = this.el.getObject3D('mesh');
        if (!mesh || !mesh.material) return;

        const materials = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
        materials.forEach(material => {
          if (material.map) {
            material.map.needsUpdate = true;
          }
          material.needsUpdate = true;
        });
      }
    });

    function requestFullscreenIfPossible() {
      const el = document.documentElement;

      try {
        if (document.fullscreenElement) return Promise.resolve(true);

        if (el.requestFullscreen) {
          return el.requestFullscreen().then(() => true).catch(() => false);
        }
        if (el.webkitRequestFullscreen) {
          el.webkitRequestFullscreen();
          return Promise.resolve(true);
        }
        if (el.msRequestFullscreen) {
          el.msRequestFullscreen();
          return Promise.resolve(true);
        }
      } catch (err) {
        return Promise.resolve(false);
      }

      return Promise.resolve(false);
    }

    function setupFullscreenHandlers() {
      const fullscreenBtn = document.getElementById('fullscreenBtn');

      const tryEnter = () => {
        requestFullscreenIfPossible().then(ok => {
          if (fullscreenBtn) fullscreenBtn.style.display = ok ? 'none' : 'block';
        });
      };

      if (fullscreenBtn) {
        fullscreenBtn.addEventListener('click', tryEnter);
      }

      window.addEventListener('pointerdown', tryEnter, { once: true, passive: true });
      window.addEventListener('touchstart', tryEnter, { once: true, passive: true });
      window.addEventListener('click', tryEnter, { once: true });
      window.addEventListener('load', tryEnter, { once: true });

      document.addEventListener('fullscreenchange', () => {
        if (fullscreenBtn) fullscreenBtn.style.display = document.fullscreenElement ? 'none' : 'block';
      });
    }

    window.addEventListener('load', () => {
      const scene = document.querySelector('a-scene');
      const debugVR = document.querySelector('#debugVR');

      setupFullscreenHandlers();

      function setupWhenSceneReady() {
        const rig = document.querySelector('#rig');
        const player = document.querySelector('#player');
        const camera = document.querySelector('#gameCamera');
        const navMeshEl = document.querySelector('#navmeshEntity');
        const cinematicScreen = document.getElementById('cinematicScreen');
        const cinematicVideo = document.getElementById('cinematicVideo');
        const handSprite = document.getElementById('handSprite');
        const handGif = document.getElementById('handGif');
        const handFreezeCanvas = document.getElementById('handFreezeCanvas');
        const handFreezeCtx = handFreezeCanvas.getContext('2d', { alpha: true });

        const stormVideo = document.getElementById('stormVideo');
        const tvVideo = document.getElementById('tvVideo');
        const joyLeft = document.getElementById('joyLeft');
        const joyRight = document.getElementById('joyRight');

        function setJoyVisible(visible) {
          const opacity = visible ? '1' : '0';
          if (joyLeft) joyLeft.style.opacity = opacity;
          if (joyRight) joyRight.style.opacity = opacity;
        }

        function startAmbientVideo(videoEl) {
          if (!videoEl) return;

          videoEl.muted = true;
          videoEl.loop = true;
          videoEl.autoplay = true;
          videoEl.playsInline = true;
          videoEl.setAttribute('muted', '');
          videoEl.setAttribute('loop', '');
          videoEl.setAttribute('autoplay', '');
          videoEl.setAttribute('playsinline', '');
          videoEl.setAttribute('webkit-playsinline', '');
          videoEl.load();

          const attemptPlay = () => {
            const playPromise = videoEl.play();
            if (playPromise && typeof playPromise.catch === 'function') {
              playPromise.catch(() => {});
            }
          };

          if (videoEl.readyState >= 2) {
            attemptPlay();
          } else {
            videoEl.addEventListener('canplay', attemptPlay, { once: true });
            videoEl.addEventListener('loadedmetadata', attemptPlay, { once: true });
            videoEl.addEventListener('loadeddata', attemptPlay, { once: true });
          }

          videoEl.addEventListener('ended', () => {
            videoEl.currentTime = 0;
            const playPromise = videoEl.play();
            if (playPromise && typeof playPromise.catch === 'function') {
              playPromise.catch(() => {});
            }
          });
        }

        function startAllAmbientVideos() {
          startAmbientVideo(stormVideo);
          startAmbientVideo(tvVideo);
        }

        startAllAmbientVideos();

        const activatedTriggers = new Set();
        let cinematicPlaying = false;
        let moving = false;
        let started = false;
        let playerModelReady = false;
        let handFrozen = false;

        const speed = 0.5;
        const rotationSmooth = 0.15;
        const deadZone = 0.15;
        const headTurnSpeed = 1.0;
        const headTurnThreshold = 0.0005;

        const raycaster = new THREE.Raycaster();
        const downVector = new THREE.Vector3(0, -1, 0);

        const playerBox = new THREE.Box3();
        const triggerBox = new THREE.Box3();

        let keys = {};
        let nippleVector = new THREE.Vector2(0, 0);
        let lookInput = new THREE.Vector2(0, 0);
        let lastTime = performance.now();
        let lastHeadYaw = null;

        if (!rig || !player || !camera || !navMeshEl) {
          console.warn('Faltan elementos esenciales del rig/cámara/navmesh');
          if (debugVR) debugVR.textContent = 'Faltan elementos esenciales del rig/cámara/navmesh';
          return;
        }

        function angleDifference(a, b) {
          const diff = b - a;
          return Math.atan2(Math.sin(diff), Math.cos(diff));
        }

        function setRigPosition(vec3) {
          rig.setAttribute('position', `${vec3.x} ${vec3.y} ${vec3.z}`);
        }

        function forceHandTextureUpdate() {
          const mesh = handSprite && handSprite.getObject3D('mesh');
          if (!mesh || !mesh.material) return;

          const materials = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
          materials.forEach(material => {
            if (material.map) {
              material.map.needsUpdate = true;
            }
            material.needsUpdate = true;
          });
        }

        function applyHandMaterial(srcSelector) {
          if (!handSprite) return;

          handSprite.setAttribute(
            'material',
            `src: ${srcSelector}; shader: flat; transparent: true; side: double; depthTest: false; depthWrite: false`
          );

          setTimeout(forceHandTextureUpdate, 0);
          requestAnimationFrame(forceHandTextureUpdate);
        }

        function freezeHandAtCurrentFrame() {
          if (!handGif || !handFreezeCanvas || !handFreezeCtx) return;

          try {
            if (!handGif.complete || handGif.naturalWidth === 0) return;

            handFreezeCtx.clearRect(0, 0, handFreezeCanvas.width, handFreezeCanvas.height);
            handFreezeCtx.drawImage(handGif, 0, 0, handFreezeCanvas.width, handFreezeCanvas.height);
            handFrozen = true;
            applyHandMaterial('#handFreezeCanvas');
          } catch (err) {
            console.warn('No se pudo congelar la mano:', err);
          }
        }

        function restoreAnimatedHand() {
          if (!handSprite) return;
          handFrozen = false;
          applyHandMaterial('#handGif');
          forceHandTextureUpdate();
        }

        function showHand() {
          if (!handSprite) return;
          handSprite.setAttribute('visible', 'true');
          restoreAnimatedHand();
        }

        function hideHand() {
          if (!handSprite) return;
          handSprite.setAttribute('visible', 'false');
        }

        function snapRigToNavmesh() {
          if (!navMeshEl.object3D) return false;

          navMeshEl.object3D.updateMatrixWorld(true);

          const origin = rig.object3D.position.clone();
          origin.y += 5;

          raycaster.set(origin, downVector);
          const intersects = raycaster.intersectObject(navMeshEl.object3D, true);

          if (intersects.length > 0) {
            const pos = rig.object3D.position.clone();
            pos.y = intersects[0].point.y;
            setRigPosition(pos);
            return true;
          }

          return false;
        }

        function updateVRDebug() {
          if (!debugVR) return;

          const lines = [];
          const xrSession = scene.renderer && scene.renderer.xr ? scene.renderer.xr.getSession() : null;
          const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];

          lines.push('XR session: ' + (xrSession ? 'activa' : 'no activa'));
          lines.push('');

          if (xrSession && xrSession.inputSources && xrSession.inputSources.length > 0) {
            lines.push('XR inputSources:');

            xrSession.inputSources.forEach((source, index) => {
              if (!source.gamepad) return;
              lines.push('Source ' + index);
              lines.push('Axes: ' + Array.from(source.gamepad.axes).map(v => Number(v).toFixed(3)).join(', '));

              source.gamepad.buttons.forEach((button, buttonIndex) => {
                if (button.pressed || button.touched || button.value > 0) {
                  lines.push(
                    'Btn ' + buttonIndex +
                    ': pressed=' + button.pressed +
                    ' touched=' + button.touched +
                    ' value=' + Number(button.value).toFixed(3)
                  );
                }
              });

              lines.push('');
            });
          } else {
            lines.push('XR inputSources: sin datos');
            lines.push('');
          }

          const activeGamepads = Array.from(gamepads).filter(Boolean);

          if (activeGamepads.length > 0) {
            lines.push('navigator.getGamepads():');

            activeGamepads.forEach((gp, index) => {
              lines.push('Pad ' + index + ': ' + (gp.id || 'sin id'));
              lines.push('Axes: ' + gp.axes.map(v => Number(v).toFixed(3)).join(', '));

              gp.buttons.forEach((button, buttonIndex) => {
                if (button.pressed || button.touched || button.value > 0) {
                  lines.push(
                    'Btn ' + buttonIndex +
                    ': pressed=' + button.pressed +
                    ' touched=' + button.touched +
                    ' value=' + Number(button.value).toFixed(3)
                  );
                }
              });

              lines.push('');
            });
          } else {
            lines.push('navigator.getGamepads(): sin pads activos');
          }

          debugVR.textContent = lines.join('\n');
        }

        function getFlatViewBasis() {
          const quat = new THREE.Quaternion();
          const euler = new THREE.Euler(0, 0, 0, 'YXZ');

          camera.object3D.getWorldQuaternion(quat);
          euler.setFromQuaternion(quat, 'YXZ');

          const yaw = euler.y;

          const forward = new THREE.Vector3(
            Math.sin(yaw),
            0,
            -Math.cos(yaw)
          );

          const right = new THREE.Vector3(
            Math.cos(yaw),
            0,
            Math.sin(yaw)
          );

          return { forward, right };
        }

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        const isTouch = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

        if (isTouch) {
          if (joyLeft) joyLeft.style.opacity = '0';
          if (joyRight) joyRight.style.opacity = '0';

          const moveJoy = nipplejs.create({
            zone: joyLeft,
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: 'white',
            size: 120
          });

          moveJoy.on('start', () => setJoyVisible(true));
          moveJoy.on('move', (evt, data) => {
            setJoyVisible(true);
            if (!data || !data.vector) return;
            nippleVector.set(data.vector.x, data.vector.y);
          });
          moveJoy.on('end', () => {
            nippleVector.set(0, 0);
            setJoyVisible(false);
          });

          const lookJoy = nipplejs.create({
            zone: joyRight,
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: 'white',
            size: 120
          });

          lookJoy.on('start', () => setJoyVisible(true));
          lookJoy.on('move', (evt, data) => {
            setJoyVisible(true);
            if (!data || !data.vector) return;
            lookInput.set(data.vector.x, data.vector.y);
          });
          lookJoy.on('end', () => {
            lookInput.set(0, 0);
            setJoyVisible(false);
          });
        }

        handGif.addEventListener('load', () => {
          if (!handFrozen) {
            restoreAnimatedHand();
          }
        });

        player.addEventListener('model-loaded', () => {
          playerModelReady = true;
        });

        function getActiveControllerInput() {
          const xrSession =
            scene.renderer &&
            scene.renderer.xr &&
            scene.renderer.xr.getSession
              ? scene.renderer.xr.getSession()
              : null;

          if (xrSession && xrSession.inputSources) {
            for (const source of xrSession.inputSources) {
              if (!source.gamepad) continue;

              const gp = source.gamepad;

              const a0x = typeof gp.axes[0] === 'number' ? gp.axes[0] : 0;
              const a0y = typeof gp.axes[1] === 'number' ? gp.axes[1] : 0;
              const a2x = typeof gp.axes[2] === 'number' ? gp.axes[2] : 0;
              const a2y = typeof gp.axes[3] === 'number' ? gp.axes[3] : 0;

              const mag01 = Math.abs(a0x) + Math.abs(a0y);
              const mag23 = Math.abs(a2x) + Math.abs(a2y);

              let rawX = 0;
              let rawY = 0;

              if (mag23 > mag01) {
                rawX = Math.abs(a2x) > deadZone ? a2x : 0;
                rawY = Math.abs(a2y) > deadZone ? a2y : 0;
              } else {
                rawX = Math.abs(a0x) > deadZone ? a0x : 0;
                rawY = Math.abs(a0y) > deadZone ? a0y : 0;
              }

              if (rawX !== 0 || rawY !== 0) {
                return { x: rawX, y: rawY };
              }

              let dpadX = 0;
              let dpadY = 0;
              if (gp.buttons[14] && gp.buttons[14].pressed) dpadX -= 1;
              if (gp.buttons[15] && gp.buttons[15].pressed) dpadX += 1;
              if (gp.buttons[12] && gp.buttons[12].pressed) dpadY += 1;
              if (gp.buttons[13] && gp.buttons[13].pressed) dpadY -= 1;

              if (dpadX !== 0 || dpadY !== 0) {
                return { x: dpadX, y: dpadY };
              }
            }
          }

          const pads = navigator.getGamepads ? navigator.getGamepads() : [];
          const activePads = Array.from(pads).filter(Boolean);

          for (const gp of activePads) {
            const a0x = typeof gp.axes[0] === 'number' ? gp.axes[0] : 0;
            const a0y = typeof gp.axes[1] === 'number' ? gp.axes[1] : 0;
            const a2x = typeof gp.axes[2] === 'number' ? gp.axes[2] : 0;
            const a2y = typeof gp.axes[3] === 'number' ? gp.axes[3] : 0;

            const mag01 = Math.abs(a0x) + Math.abs(a0y);
            const mag23 = Math.abs(a2x) + Math.abs(a2y);

            let rawX = 0;
            let rawY = 0;

            if (mag23 > mag01) {
              rawX = Math.abs(a2x) > deadZone ? a2x : 0;
              rawY = Math.abs(a2y) > deadZone ? a2y : 0;
            } else {
              rawX = Math.abs(a0x) > deadZone ? a0x : 0;
              rawY = Math.abs(a0y) > deadZone ? a0y : 0;
            }

            if (rawX !== 0 || rawY !== 0) {
              return { x: rawX, y: rawY };
            }

            let dpadX = 0;
            let dpadY = 0;
            if (gp.buttons[14] && gp.buttons[14].pressed) dpadX -= 1;
            if (gp.buttons[15] && gp.buttons[15].pressed) dpadX += 1;
            if (gp.buttons[12] && gp.buttons[12].pressed) dpadY += 1;
            if (gp.buttons[13] && gp.buttons[13].pressed) dpadY -= 1;

            if (dpadX !== 0 || dpadY !== 0) {
              return { x: dpadX, y: dpadY };
            }
          }

          return null;
        }

        function activateTrigger(trigger) {
          const triggerId = trigger.id;
          if (activatedTriggers.has(triggerId)) return;
          activatedTriggers.add(triggerId);

          const audioId = trigger.getAttribute('data-audio');
          const videoId = trigger.getAttribute('data-video');

          if (audioId) {
            const audio = document.getElementById(audioId);
            if (!audio) {
              console.warn('No existe:', audioId);
            } else {
              audio.currentTime = 0;
              audio.play().catch(err => console.error(err));
            }
          }

          if (videoId) {
            const video = document.getElementById(videoId);
            if (!video) {
              console.warn('No existe:', videoId);
            } else {
              cinematicPlaying = true;
              cinematicScreen.setAttribute('visible', 'true');

              cinematicVideo.pause();
              cinematicVideo.currentTime = 0;
              cinematicVideo.src = video.src;
              cinematicVideo.load();

              cinematicVideo.oncanplay = () => {
                cinematicVideo.play().catch(err => console.error(err));
              };

              cinematicVideo.onended = () => {
                cinematicVideo.pause();
                cinematicScreen.setAttribute('visible', 'false');
                cinematicPlaying = false;
              };
            }
          }
        }

        function tick() {
          const now = performance.now();
          const delta = (now - lastTime) / 1000;
          lastTime = now;

          updateVRDebug();

          if (cinematicPlaying) {
            requestAnimationFrame(tick);
            return;
          }

          navMeshEl.object3D.updateMatrixWorld(true);

          const input = new THREE.Vector2(0, 0);

          if (keys['w'] || keys['arrowup']) input.y -= 1;
          if (keys['s'] || keys['arrowdown']) input.y += 1;
          if (keys['a'] || keys['arrowleft']) input.x -= 1;
          if (keys['d'] || keys['arrowright']) input.x += 1;

          input.x += nippleVector.x;
          input.y -= nippleVector.y;

          const controllerInput = getActiveControllerInput();
          if (controllerInput) {
            input.x += controllerInput.x;
            input.y += controllerInput.y;
          }

          const vrMode = scene.is && scene.is('vr-mode');

          if (vrMode) {
            const euler = new THREE.Euler(0, 0, 0, 'YXZ');
            euler.setFromQuaternion(camera.object3D.quaternion, 'YXZ');

            const currentHeadYaw = euler.y;

            if (lastHeadYaw === null) {
              lastHeadYaw = currentHeadYaw;
            } else {
              const deltaYaw = angleDifference(lastHeadYaw, currentHeadYaw);

              if (Math.abs(deltaYaw) > headTurnThreshold) {
                rig.object3D.rotation.y += deltaYaw * headTurnSpeed;
              }

              lastHeadYaw = currentHeadYaw;
            }
          } else {
            lastHeadYaw = null;

            const look = camera.components['look-controls'];
            if (look) {
              const rotSpeed = 1.5;

              look.yawObject.rotation.y -= lookInput.x * rotSpeed * delta;
              look.pitchObject.rotation.x -= lookInput.y * rotSpeed * delta;

              const maxPitch = Math.PI / 2 - 0.1;
              look.pitchObject.rotation.x = Math.max(
                -maxPitch,
                Math.min(maxPitch, look.pitchObject.rotation.x)
              );
            }
          }

          if (input.length() > 0) {
            input.normalize();

            const basis = getFlatViewBasis();

            const moveVector = new THREE.Vector3();
            moveVector.addScaledVector(basis.forward, -input.y);
            moveVector.addScaledVector(basis.right, input.x);

            const subSteps = 8;
            const cornerFriction = 0.5;
            const totalMove = moveVector.clone().multiplyScalar(speed * delta);
            const stepMove = totalMove.clone().divideScalar(subSteps);

            let currentPosition = rig.object3D.position.clone();

            for (let i = 0; i < subSteps; i++) {
              let moved = false;

              let testFull = currentPosition.clone().add(stepMove);
              let origin = testFull.clone();
              origin.y += 5;

              raycaster.set(origin, downVector);
              let intersects = raycaster.intersectObject(navMeshEl.object3D, true);

              if (intersects.length > 0) {
                currentPosition.copy(testFull);
                currentPosition.y = intersects[0].point.y;
                moved = true;
              }

              if (!moved) {
                const tryAxis = (axis, amount) => {
                  let reduced = amount;

                  for (let r = 0; r < 3; r++) {
                    let test = currentPosition.clone();
                    test[axis] += reduced;

                    let o = test.clone();
                    o.y += 5;

                    raycaster.set(o, downVector);
                    let hits = raycaster.intersectObject(navMeshEl.object3D, true);

                    if (hits.length > 0) {
                      currentPosition[axis] = test[axis];
                      currentPosition.y = hits[0].point.y;
                      return true;
                    }

                    reduced *= cornerFriction;
                  }
                  return false;
                };

                tryAxis('x', stepMove.x);
                tryAxis('z', stepMove.z);
              }
            }

            setRigPosition(currentPosition);

            const moveAngle = Math.atan2(moveVector.x, moveVector.z);
            const targetRotation = moveAngle + Math.PI;
            const currentRotation = player.object3D.rotation.y;
            const diff = angleDifference(currentRotation, targetRotation);
            player.object3D.rotation.y += diff * rotationSmooth;

            if (!moving) {
              showHand();
              moving = true;
            }
          } else {
            if (moving) {
              freezeHandAtCurrentFrame();
              moving = false;
            }
          }

          snapRigToNavmesh();

          if (playerModelReady) {
            player.object3D.updateMatrixWorld(true);
            playerBox.setFromObject(player.object3D);

            document.querySelectorAll('.trigger').forEach(trigger => {
              const triggerId = trigger.id;
              if (activatedTriggers.has(triggerId)) return;

              trigger.object3D.updateMatrixWorld(true);
              triggerBox.setFromObject(trigger.object3D);

              if (playerBox.intersectsBox(triggerBox)) {
                activateTrigger(trigger);
              }
            });
          } else {
            const playerPos = rig.object3D.position.clone();

            document.querySelectorAll('.trigger').forEach(trigger => {
              const triggerId = trigger.id;
              if (activatedTriggers.has(triggerId)) return;

              const triggerPos = new THREE.Vector3();
              trigger.object3D.getWorldPosition(triggerPos);
              const distance = playerPos.distanceTo(triggerPos);

              if (distance < 1.2) {
                activateTrigger(trigger);
              }
            });
          }

          requestAnimationFrame(tick);
        }

        navMeshEl.addEventListener('model-loaded', () => {
          console.log('Navmesh cargado');
          if (!started) {
            started = true;
            snapRigToNavmesh();
            hideHand();
            tick();
          }
        });
      }

      if (scene.hasLoaded) {
        setupWhenSceneReady();
      } else {
        scene.addEventListener('loaded', setupWhenSceneReady);
      }
    });

    function unlockAmbientVideos() {
      const stormVideo = document.getElementById('stormVideo');
      const tvVideo = document.getElementById('tvVideo');

      if (stormVideo) {
        stormVideo.muted = true;
        stormVideo.loop = true;
        const p1 = stormVideo.play();
        if (p1 && typeof p1.catch === 'function') p1.catch(() => {});
      }

      if (tvVideo) {
        tvVideo.muted = true;
        tvVideo.loop = true;
        const p2 = tvVideo.play();
        if (p2 && typeof p2.catch === 'function') p2.catch(() => {});
      }
    }

    window.addEventListener('click', unlockAmbientVideos, { once: true });
    window.addEventListener('touchstart', unlockAmbientVideos, { once: true, passive: true });
    window.addEventListener('pointerdown', unlockAmbientVideos, { once: true, passive: true });
    window.addEventListener('load', unlockAmbientVideos);

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        unlockAmbientVideos();
      }
    });
  </script>
